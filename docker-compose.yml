    #     container_name: webdev-mosquitto1
    #     restart: always
    #     ports:
    #         - "1883:1883"
    #     volumes:
    #         - .docker/mosquitto1/mosquitto.conf:/mosquitto/config/mosquitto.conf
    #         - mosquitto1_data:/mosquitto/data
    #         - mosquitto1_log:/mosquitto/log
    #     networks:
